# gatewayclass.yaml
apiVersion: gateway.networking.k8s.io/v1beta1
kind: GatewayClass
metadata:
  name: kong
spec:
  controllerName: konghq.com/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: fastapi-gateway
  namespace: default
spec:
  gatewayClassName: kong
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: fastapi-route
  namespace: default
spec:
  parentRefs:
    - name: fastapi-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix  # <-- εδώ το αλλάξαμε από "Prefix"
            value: /
      backendRefs:
        - name: fastapi-service
          port: 5000
          weight: 1
